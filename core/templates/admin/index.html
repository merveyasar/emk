<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <title>KOÜ EMK | Dinamik Canlı Editör</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <style>
      :root {
        --emk-orange: #f28c28;
        --emk-dark: #121212;
        --sidebar-bg: #1e1e2d;
      }
      body {
        font-family: "Inter", sans-serif;
        height: 100vh;
        margin: 0;
        display: flex;
        overflow: hidden;
        background: #f4f7f6;
      }
      .sidebar {
        width: 420px;
        background: var(--sidebar-bg);
        color: white;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.3);
        z-index: 100;
      }
      .sidebar-header {
        padding: 25px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }
      .sidebar-header h2 {
        font-family: "Space Grotesk";
        color: var(--emk-orange);
        font-size: 1.4rem;
        margin: 0;
      }
      #editor-fields {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
      }
      .edit-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 12px;
        padding: 15px;
        margin-bottom: 20px;
        border-left: 4px solid var(--emk-orange);
        transition: 0.3s;
      }
      .form-label {
        color: var(--emk-orange);
        font-size: 0.75rem;
        font-weight: bold;
        text-transform: uppercase;
        margin-bottom: 8px;
        display: block;
      }
      .form-control {
        background: #2b2b40;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 8px;
        font-size: 0.9rem;
      }
      .preview-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        background: #333;
      }
      .browser-mockup {
        background: white;
        padding: 10px 20px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid #ddd;
      }
      .url-bar {
        background: #f1f1f1;
        border-radius: 20px;
        padding: 4px 20px;
        flex: 1;
        margin: 0 15px;
        font-size: 0.8rem;
        color: #666;
        font-family: monospace;
      }
      iframe {
        flex: 1;
        border: none;
        background: white;
      }
      .sidebar-footer {
        padding: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(0, 0, 0, 0.2);
      }
      .btn-publish {
        background: var(--emk-orange);
        color: white;
        font-weight: 700;
        text-transform: uppercase;
        border: none;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        transition: 0.3s;
      }
      .btn-add-member {
        background: transparent;
        border: 2px dashed var(--emk-orange);
        color: var(--emk-orange);
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        margin-top: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <div class="sidebar-header">
        <h2><i class="fas fa-microchip me-2"></i>EMK ENGINE</h2>
        <div id="page-indicator" class="small text-white-50 mt-2">
          Sayfa bekleniyor...
        </div>
      </div>
      <div id="editor-fields">
        <div class="text-center mt-5 text-white-50">
          <i class="fas fa-spinner fa-spin fa-2x mb-3"></i>
          <p>Sağ taraftan bir sayfaya gidin...</p>
        </div>
      </div>
      <div class="sidebar-footer">
        <button class="btn btn-publish" onclick="publishChanges()">
          <i class="fas fa-cloud-upload-alt me-2"></i>DEĞİŞİKLİKLERİ YAYINLA
        </button>
      </div>
    </div>

    <div class="preview-container">
      <div class="browser-mockup">
        <div class="d-flex gap-2">
          <div
            style="
              width: 10px;
              height: 10px;
              border-radius: 50%;
              background: #ff5f56;
            "
          ></div>
          <div
            style="
              width: 10px;
              height: 10px;
              border-radius: 50%;
              background: #ffbd2e;
            "
          ></div>
          <div
            style="
              width: 10px;
              height: 10px;
              border-radius: 50%;
              background: #27c93f;
            "
          ></div>
        </div>
        <div class="url-bar" id="url-display">http://localhost:8000/</div>
        <button class="btn btn-sm" onclick="refreshFrame()">
          <i class="fas fa-sync-alt"></i>
        </button>
      </div>
      <iframe id="site-frame" src="/"></iframe>
    </div>

    <!-- Head içine CSS -->
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />

    <!-- Body sonuna JS -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>

    <script>
      const frame = document.getElementById("site-frame");
      const fieldsContainer = document.getElementById("editor-fields");
      const pageIndicator = document.getElementById("page-indicator");
      const urlDisplay = document.getElementById("url-display");

      // Bu fonksiyonu eskisiyle değiştir kanka
      function updateEditorUI(pageData) {
        urlDisplay.innerText = "http://localhost:8000" + pageData.path;
        pageIndicator.innerHTML = `<i class="fas fa-file-code"></i> Model: <b>${pageData.model}</b>`;
        fieldsContainer.innerHTML = ""; // Temizle

        if (!pageData.elements || pageData.elements.length === 0) {
          fieldsContainer.innerHTML =
            '<div class="text-white-50 text-center p-4">Düzenlenebilir alan bulunamadı.</div>';
        }

        pageData.elements.forEach((el) => {
          const card = document.createElement("div");
          card.className = "edit-card";

          let inputElement = "";
          if (el.type === "image") {
            inputElement = `<input type="file" data-field-key="${el.id}" class="form-control" onchange="syncImage('${el.id}', '${el.id}', this)">`;
          } else {
            // data-field-key burada veritabanındaki JSON anahtarı olacak
            inputElement = `<textarea data-field-key="${el.id}" class="form-control" rows="2" oninput="syncText('${el.id}', '${el.id}', this.value)">${el.value}</textarea>`;
          }

          card.innerHTML = `<label class="form-label">${el.label}</label>${inputElement}`;
          fieldsContainer.appendChild(card);
        });

        // Yeni Üye Ekleme Formu (Eğer Model TeamMember ise)
        if (pageData.model === "TeamMember") {
          const addBtn = document.createElement("button");
          addBtn.className =
            "btn-add-member btn btn-outline-warning w-100 mt-3";
          addBtn.innerHTML =
            '<i class="fas fa-plus me-2"></i>YENİ ÜYE EKLEME FORMUNU AÇ';
          addBtn.onclick = () => {
            /* Senin mevcut addNewMember form mantığın buraya gelebilir */
          };
          // İstersen senin mevcut addSection kodunu buraya direkt gömebilirsin.
        }

        if (pageData.model === "Magazine") {
          const addMagBtn = document.createElement("button");
          addMagBtn.className = "btn btn-outline-success w-100 mt-3 fw-bold";
          addMagBtn.innerHTML =
            '<i class="fas fa-plus me-2"></i>YENİ SAYI EKLE';
          addMagBtn.onclick = () => {
            openNewMagazineForm();
          };
          fieldsContainer.appendChild(addMagBtn);
        }

        // Sidebar updateEditorUI içine eklenecek kısım
        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "CaseOfLegends"
        ) {
          const addColBtn = document.createElement("button");
          addColBtn.className = "btn btn-outline-warning w-100 mt-3 fw-bold";
          addColBtn.innerHTML =
            '<i class="fas fa-trophy me-2"></i>YENİ ARŞİV YILI (COL) EKLE';
          addColBtn.onclick = () => {
            // Yeni OrganizationEvent formu açacak (type='COL' olarak set edilecek)
            openNewOrgEventForm("COL");
          };
          fieldsContainer.appendChild(addColBtn);
        }
        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "Training"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ EĞİTİM EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("Training");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "GDKG"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ YOLCULUK EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("GDKG");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "KALE"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ KALE EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("KALE");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "MentorshipProgram"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ MENTÖR EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("MentorshipProgram");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "SB"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ SB EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("SB");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "SG"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ SG EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("SG");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }

        if (
          pageData.model === "OrganizationEvent" &&
          pageData.sub_model === "TG"
        ) {
          const addTrainingBtn = document.createElement("button");
          addTrainingBtn.className = "btn btn-outline-info w-100 mt-3 fw-bold";
          addTrainingBtn.innerHTML =
            '<i class="fas fa-graduation-cap me-2"></i>YENİ TG EKLE';
          addTrainingBtn.onclick = () => {
            openNewOrgEventForm("TG");
          };
          fieldsContainer.appendChild(addTrainingBtn);
        }
      }

      function openNewOrgEventForm(pk) {
        fetch(`/editor/get-org-event/${pk}/`)
          .then((res) => res.json())
          .then((data) => {
            fieldsContainer.innerHTML = `
                  <div class="d-flex justify-content-between align-items-center mb-3">
                      <h6 class="text-warning m-0">Etkinlik Düzenle (${data.type})</h6>
                      <button class="btn btn-sm btn-outline-danger" onclick="deleteOrgEvent(${pk})"><i class="fas fa-trash"></i></button>
                  </div>

                  <div class="edit-card">
                      <label class="form-label">Etkinlik Başlığı</label>
                      <input type="text" id="edit-org-title" class="form-control mb-2" value="${data.title}">

                      <label class="form-label">Yıl</label>
                      <input type="number" id="edit-org-year" class="form-control mb-2" value="${data.year}">

                      <label class="form-label">Şampiyon Takım (Extra Data)</label>
                      <input type="text" id="edit-org-winner" class="form-control mb-2" value="${data.extra_data.winner || ""}">

                      <label class="form-label">Kısa Özet (Extra Data)</label>
                      <textarea id="edit-org-summary" class="form-control mb-3" rows="3">${data.extra_data.summary || ""}</textarea>

                      <div class="form-check form-switch mb-3">
                          <input class="form-check-input" type="checkbox" id="edit-org-active" ${data.is_active ? "checked" : ""}>
                          <label class="form-check-label text-white">Aktif Etkinlik</label>
                      </div>

                      <button class="btn btn-success btn-sm w-100" onclick="updateOrgEvent(${pk}, '${data.type}')">KAYDET</button>
                  </div>
              `;
          });
      }

      // YAYINLA BUTONU - TAM DÜZELTİLMİŞ HALİ
      function publishChanges() {
        const contentData = {};
        const inputs = fieldsContainer.querySelectorAll("[data-field-key]");

        inputs.forEach((el) => {
          const key = el.getAttribute("data-field-key");
          const value = el.value.trim();
          if (key) contentData[key] = value;
        });

        if (Object.keys(contentData).length === 0) {
          showNotify("⚠️ Kaydedilecek veri bulunamadı!", "error");
          return;
        }

        const formData = new FormData();
        formData.append("path", frame.contentWindow.location.pathname);
        formData.append("data", JSON.stringify(contentData));

        fetch("/editor/universal-save/", {
          method: "POST",
          body: formData,
          headers: { "X-CSRFToken": getCookie("csrftoken") },
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              showNotify("🚀 Değişiklikler başarıyla yayınlandı!");
              frame.contentWindow.location.reload(); // Değişiklikleri tam görmek için yenile
            }
          });
      }
      function syncText(id, field, value) {
        frame.contentWindow.postMessage(
          {
            type: "LIVE_UPDATE",
            id: id,
            field: field,
            val: value,
            isImage: false,
          },
          "*",
        );
      }

      function syncImage(id, field, input) {
        if (input.files && input.files[0]) {
          const reader = new FileReader();
          reader.onload = (e) => {
            frame.contentWindow.postMessage(
              {
                type: "LIVE_UPDATE",
                id: id,
                field: field,
                val: e.target.result,
                isImage: true,
              },
              "*",
            );
          };
          reader.readAsDataURL(input.files[0]);
        }
      }

      function refreshFrame() {
        frame.contentWindow.location.reload();
      }

      function showNotify(text, type = "success") {
        Toastify({
          text: text,
          duration: 3000,
          gravity: "top", // top veya bottom
          position: "right", // left, center veya right
          stopOnFocus: true,
          style: {
            background: type === "success" ? "#27c93f" : "#ff5f56",
            borderRadius: "10px",
            fontFamily: "Inter",
            fontWeight: "600",
            boxShadow: "0 10px 20px rgba(0,0,0,0.2)",
          },
        }).showToast();
      }

      function addNewMember() {
        const formData = new FormData();

        // Alanları topla
        formData.append("name", document.getElementById("new-name").value);
        formData.append("title", document.getElementById("new-title").value);
        formData.append("rank", document.getElementById("new-rank").value);
        formData.append("team", document.getElementById("new-team").value);
        formData.append("order", document.getElementById("new-order").value);

        // Resim dosyasını al
        const imageFile = document.getElementById("new-image").files[0];
        if (imageFile) {
          formData.append("image", imageFile);
        }

        // Basit doğrulama
        if (!document.getElementById("new-name").value) {
          showNotify("Lütfen isim giriniz!", "error");
          return;
        }

        // Django Backend'e gönder
        fetch("/editor/add-member/", {
          // Bu URL'i urls.py'da tanımlamış olmalısın
          method: "POST",
          body: formData,
          headers: {
            "X-CSRFToken": getCookie("csrftoken"), // Güvenlik için şart
          },
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              showNotify("Üye başarıyla eklendi!");
              refreshFrame(); // Sağdaki iframe'i yenile
            } else {
              showNotify("Hata: " + data.message, "error");
            }
          })
          .catch((error) => console.error("Hata:", error));
      }

      // updateEditorUI içindeki butona tıklandığında çalışacak
      function openNewMagazineForm() {
        fieldsContainer.innerHTML = `
          <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="text-success m-0"><i class="fas fa-plus-circle me-2"></i>Yeni Dergi Sayısı Ekle</h6>
              <button class="btn btn-sm btn-outline-light" onclick="refreshFrame()">İPTAL</button>
          </div>

          <div class="edit-card" style="border-left-color: #27c93f; background: rgba(39, 201, 63, 0.05);">
              <label class="form-label">Dergi Başlığı (Örn: Lojistik 4.0)</label>
              <input type="text" id="new-mag-title" class="form-control mb-2" placeholder="Başlık giriniz">

              <label class="form-label">Sayı No</label>
              <input type="number" id="new-mag-issue" class="form-control mb-2" placeholder="Örn: 42">

              <label class="form-label">Yayın Tarihi</label>
              <input type="date" id="new-mag-date" class="form-control mb-2">

              <label class="form-label">Kısa Açıklama</label>
              <textarea id="new-mag-desc" class="form-control mb-2" rows="3" placeholder="Bu sayıda neler var?"></textarea>

              <label class="form-label">Okuma Linki (Drive/Issuu URL)</label>
              <input type="url" id="new-mag-link" class="form-control mb-2" placeholder="https://drive.google.com/...">

              <label class="form-label">Kapak Fotoğrafı</label>
              <input type="file" id="new-mag-cover" class="form-control mb-3" accept="image/*">

              <button class="btn btn-success btn-sm w-100 fw-bold" onclick="saveNewMagazine()">
                  <i class="fas fa-save me-2"></i>VERİTABANINA KAYDET
              </button>
          </div>
      `;
      }

      // Veriyi Django'ya gönderen fonksiyon
      function saveNewMagazine() {
        const formData = new FormData();
        formData.append(
          "title",
          document.getElementById("new-mag-title").value,
        );
        formData.append(
          "issue_number",
          document.getElementById("new-mag-issue").value,
        );
        formData.append(
          "release_date",
          document.getElementById("new-mag-date").value,
        );
        formData.append(
          "description",
          document.getElementById("new-mag-desc").value,
        );
        formData.append(
          "read_link",
          document.getElementById("new-mag-link").value,
        );

        const coverFile = document.getElementById("new-mag-cover").files[0];
        if (coverFile) formData.append("cover_image", coverFile);

        if (!document.getElementById("new-mag-title").value || !coverFile) {
          showNotify(
            "Lütfen başlık ve kapak fotoğrafını eksik etmeyin!",
            "error",
          );
          return;
        }

        fetch("/editor/add-magazine/", {
          // URL'i urls.py'a ekleyeceğiz
          method: "POST",
          body: formData,
          headers: { "X-CSRFToken": getCookie("csrftoken") },
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              showNotify("📚 Yeni sayı arşive eklendi!");
              refreshFrame();
            } else {
              showNotify("Hata: " + data.message, "error");
            }
          });
      }
      window.addEventListener("message", (event) => {
        const data = event.data;
        console.log("📩 Editöre Mesaj Geldiiiiii:", data);

        if (data.type === "PAGE_REPORT") {
          updateEditorUI(data);
        }

        // Tıklanan nesneye göre doğru yükleme fonksiyonunu çağır
        if (data.type === "OBJECT_CLICKED") {
          if (data.model === "TeamMember") {
            loadMemberIntoEditor(data.object);
          } else if (data.model === "Magazine") {
            loadMagazineIntoEditor(data.object);
          }
        }
      });

      function loadMagazineIntoEditor(id) {
        fieldsContainer.innerHTML = `<div class="text-white-50 p-4"><i class="fas fa-spinner fa-spin me-2"></i>Dergi verileri çekiliyor...</div>`;

        fetch(`/editor/get-magazine/${id}/`) // Bu URL'i urls.py'da tanımlamalıyız
          .then((res) => res.json())
          .then((data) => {
            fieldsContainer.innerHTML = `
                  <div class="d-flex justify-content-between align-items-center mb-3">
                      <h6 class="text-warning m-0"><i class="fas fa-book-open me-2"></i>Dergi Düzenle</h6>
                      <button class="btn btn-sm btn-outline-danger" onclick="deleteMagazine(${id})">
                          <i class="fas fa-trash"></i>
                      </button>
                  </div>

                  <div class="edit-card" style="border-left-color: #f28c28;">
                      <div class="text-center mb-3">
                          <img src="${data.cover_url}" style="width:80px; height:120px; border-radius:8px; object-fit:cover; border: 2px solid #f28c28;">
                      </div>

                      <label class="form-label">Kapak Resmini Değiştir</label>
                      <input type="file" id="edit-mag-cover" class="form-control mb-3" accept="image/*">

                      <label class="form-label">Dergi Başlığı</label>
                      <input type="text" id="edit-mag-title" class="form-control mb-2" value="${data.title}">

                      <label class="form-label">Sayı No</label>
                      <input type="number" id="edit-mag-issue" class="form-control mb-2" value="${data.issue_number}">

                      <label class="form-label">Açıklama</label>
                      <textarea id="edit-mag-desc" class="form-control mb-2" rows="3">${data.description}</textarea>

                      <label class="form-label">Okuma Linki (URL)</label>
                      <input type="url" id="edit-mag-link" class="form-control mb-3" value="${data.read_link}">

                      <button class="btn btn-warning btn-sm w-100 fw-bold" onclick="updateMagazine(${id})">
                          DEĞİŞİKLİKLERİ KAYDET
                      </button>
                      <button class="btn btn-sm btn-link text-white-50 w-100 mt-2" onclick="refreshFrame()">Vazgeç</button>
                  </div>
              `;
          });
      }

      function updateMagazine(id) {
        const formData = new FormData();
        formData.append(
          "title",
          document.getElementById("edit-mag-title").value,
        );
        formData.append(
          "issue_number",
          document.getElementById("edit-mag-issue").value,
        );
        formData.append(
          "description",
          document.getElementById("edit-mag-desc").value,
        );
        formData.append(
          "read_link",
          document.getElementById("edit-mag-link").value,
        );

        const coverInput = document.getElementById("edit-mag-cover");
        if (coverInput.files[0]) {
          formData.append("cover_image", coverInput.files[0]);
        }

        fetch(`/editor/update-magazine/${id}/`, {
          method: "POST",
          body: formData,
          headers: { "X-CSRFToken": getCookie("csrftoken") },
        })
          .then((res) => res.json())
          .then((data) => {
            if (data.status === "success") {
              showNotify("📚 Dergi başarıyla güncellendi!");
              refreshFrame();
            } else {
              showNotify("Hata: " + data.message, "error");
            }
          });
      }

      function loadMemberIntoEditor(id) {
        fieldsContainer.innerHTML = `<div class="text-white-50 p-4"><i class="fas fa-spinner fa-spin me-2"></i>Veriler çekiliyor...</div>`;

        fetch(`/editor/get-member/${id}/`)
          .then((res) => res.json())
          .then((data) => {
            fieldsContainer.innerHTML = `
                  <div class="d-flex justify-content-between align-items-center mb-3">
                      <h6 class="text-warning m-0"><i class="fas fa-edit me-2"></i>Üye Düzenle</h6>
                      <button class="btn btn-sm btn-outline-danger" onclick="deleteMember(${id})">
                          <i class="fas fa-trash"></i> SİL
                      </button>
                  </div>

                  <div class="edit-card" style="border-left-color: var(--emk-orange);">
                      <div class="text-center mb-3">
                          <img src="${data.image_url}" style="width:60px; height:60px; border-radius:50%; object-fit:cover; border: 2px solid var(--emk-orange);">
                      </div>

                      <label class="form-label">Profil Fotoğrafını Değiştir</label>
                      <input type="file" id="edit-image" class="form-control mb-3" accept="image/*">

                      <label class="form-label">İsim Soyisim</label>
                      <input type="text" id="edit-name" class="form-control mb-2" value="${data.name}">

                      <label class="form-label">Ünvan</label>
                      <input type="text" id="edit-title" class="form-control mb-2" value="${data.title}">

                      <div class="row g-2">
                          <div class="col-6">
                              <label class="form-label">Rütbe</label>
                              <select id="edit-rank" class="form-control mb-2">
                                  <option value="ALFA" ${data.rank === "ALFA" ? "selected" : ""}>ALFA</option>
                                  <option value="BETA" ${data.rank === "BETA" ? "selected" : ""}>BETA</option>
                                  <option value="GAMA" ${data.rank === "GAMA" ? "selected" : ""}>GAMA</option>
                              </select>
                          </div>
                          <div class="col-6">
                              <label class="form-label">Ekip</label>
                              <select id="edit-team" class="form-control mb-2">
                                  <option value="DIS" ${data.team === "DIS" ? "selected" : ""}>Dış Org.</option>
                                  <option value="IC" ${data.team === "IC" ? "selected" : ""}>İç Org.</option>
                                  <option value="IK" ${data.team === "IK" ? "selected" : ""}>İK</option>
                                  <option value="FIN" ${data.team === "FIN" ? "selected" : ""}>Finans</option>
                                  <option value="GAMA" ${data.team === "GAMA" ? "selected" : ""}>Gama Kurulu</option>
                              </select>
                          </div>
                      </div>

                      <label class="form-label">Sıralama</label>
                      <input type="number" id="edit-order" class="form-control mb-3" value="${data.order}">

                      <button class="btn btn-warning btn-sm w-100 fw-bold" onclick="updateMember(${id})">
                          DEĞİŞİKLİKLERİ KAYDET
                      </button>
                      <button class="btn btn-sm btn-link text-white-50 w-100 mt-2" onclick="refreshFrame()">Vazgeç</button>
                  </div>
              `;
          });
      }

      function deleteMember(id) {
        if (confirm("Bu üyeyi silmek istediğinize emin misiniz?")) {
          fetch(`/editor/delete-member/${id}/`, {
            method: "POST",
            headers: { "X-CSRFToken": getCookie("csrftoken") },
          }).then(() => {
            showNotify("Üye silindi.");
            refreshFrame(); // Sayfayı yenile
            fieldsContainer.innerHTML = "Üye silindi.";
          });
        }
      }
      function updateMember(id) {
        const formData = new FormData();

        // Form elemanlarını ID'lerine göre yakala
        formData.append("name", document.getElementById("edit-name").value);
        formData.append("title", document.getElementById("edit-title").value);
        formData.append("rank", document.getElementById("edit-rank").value);
        formData.append("team", document.getElementById("edit-team").value);
        formData.append("order", document.getElementById("edit-order").value);

        // Eğer yeni bir resim seçildiyse ekle
        const imageInput = document.getElementById("edit-image");
        if (imageInput && imageInput.files[0]) {
          formData.append("image", imageInput.files[0]);
        }

        // Django'ya gönder
        fetch(`/editor/update-member/${id}/`, {
          method: "POST",
          body: formData,
          headers: {
            "X-CSRFToken": getCookie("csrftoken"),
          },
        })
          .then((response) => response.json())
          .then((data) => {
            if (data.status === "success") {
              showNotify("Üye bilgileri başarıyla güncellendi!");
              // Sağdaki iframe'i yenileyerek sonucu canlı gör
              refreshFrame();
            } else {
              showNotify("Hata oluştu: " + data.message, "error");
            }
          })
          .catch((error) => console.error("Hata:", error));
      }

      // CSRF Token almak için yardımcı fonksiyon
      function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== "") {
          const cookies = document.cookie.split(";");
          for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === name + "=") {
              cookieValue = decodeURIComponent(
                cookie.substring(name.length + 1),
              );
              break;
            }
          }
        }
        return cookieValue;
      }
    </script>
  </body>
</html>
