<!-- partials/_program_cards.html -->
<style>
  /* Program Grid Düzeni - 4'lü Sütun */
  .program-grid-layout {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    width: 100%;
  }

  /* Program Kartı Modernizasyonu */
  .program-card {
    position: relative;
    border-radius: 24px;
    overflow: hidden;
    height: 240px;
    display: block;
    text-decoration: none;
    transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  .program-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.8s ease;
  }

  .program-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(15, 16, 18, 0.9) 10%,
      rgba(15, 16, 18, 0.4) 50%,
      transparent 100%
    );
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
    color: white;
  }

  .program-overlay h6 {
    font-size: 1.5rem;
    font-weight: 800;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .program-overlay p {
    font-size: 0.9rem;
    opacity: 0.8;
    margin: 0;
  }

  /* Hover Efektleri */
  .program-card:hover {
    transform: translateY(-8px) scale(1.02);
    box-shadow: 0 20px 40px rgba(242, 140, 40, 0.2);
  }

  .program-card:hover img {
    transform: scale(1.1);
  }

  @media (max-width: 768px) {
    .program-grid-layout {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>
